
<!-- BEGINNER GUIDE: Registration page markup.
     Collects new user profile/account data for sign-up. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - CashMorph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <a href="index.html" class="brand auth-brand" aria-label="CashMorph home">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 4v16m0 0-3-3m3 3 3-3M16 20V4m0 0-3 3m3-3 3 3"></path>
        </svg>
      </span>
      <span class="brand-text"><span class="cash">Cash</span>Morph</span>
    </a>

    <section class="auth-card register-card">
      <h1>Create account</h1>
      <p>Register to post and manage exchange requests</p>

      <form id="registerForm" class="auth-form" novalidate>
        <label for="registerName">Full Name</label>
        <input id="registerName" name="name" type="text" placeholder="e.g. John" required />

        <div class="split-two">
          <div>
            <label for="registerRoom">Room Number</label>
            <input id="registerRoom" name="roomNumber" type="text" placeholder="e.g. B204" required />
          </div>
          <div>
            <label for="registerBlock">Block</label>
            <select id="registerBlock" name="block" required>
              <option value="">Select block</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
        </div>

        <label for="registerPhone">Phone Number</label>
        <input id="registerPhone" name="phone" type="tel" placeholder="08012345678" required />

        <label for="registerEmail">Email</label>
        <input id="registerEmail" name="email" type="email" placeholder="you@example.com" required />

        <label for="registerPassword">Password</label>
        <input id="registerPassword" name="password" type="password" placeholder="Minimum 6 characters" required minlength="6" />

        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <p id="registerMessage" class="form-message"></p>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
