
<!-- BEGINNER GUIDE: Login page markup.
     Collects user credentials and submits authentication requests. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CashMorph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page auth-login-v2">
  <main class="auth-wrap">
    <a href="index.html" class="brand auth-brand" aria-label="CashMorph home">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 4v16m0 0-3-3m3 3 3-3M16 20V4m0 0-3 3m3-3 3 3"></path>
        </svg>
      </span>
      <span class="brand-text"><span class="cash">Cash</span>Morph</span>
    </a>

    <section class="auth-card login-card-v2">
      <h1>Welcome back</h1>
      <p>Sign in to access the exchange board</p>

      <form id="loginForm" class="auth-form" novalidate>
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required />

        <div class="label-row">
          <label for="loginPassword">Password</label>
          <a href="register.html">Forgot password?</a>
        </div>
        <input id="loginPassword" name="password" type="password" placeholder="........" required minlength="6" />

        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>

      <p id="loginMessage" class="form-message"></p>
      <p class="auth-switch">Don't have an account? <a href="register.html">Sign up</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
